<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ChistesRodolfo</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <div id="support-banner" class="support-banner">
        <h2>Servicio Finalizado</h2>
        <p>Esta plataforma ha concluido su ciclo de soporte. Actualmente, la generación y gestión de los chistes se lleva a cabo de manera directa por Rodolfo.</p>
        <button id="view-old-jokes-btn">Ver chistes antiguos <i class="fa-solid fa-arrow-right"></i></button>
    </div>

    <header id="main-header" class="hidden">
        <h1>ChistesRodolfo</h1>

        <div class="avatar-section">
            <div id="avatar-container">
                <img id="rodolfo-img" src="XDDDS.jpg" alt="Avatar" class="hidden">
                
                <span id="placeholder-icon">🤖</span>
            </div>
        </div>
        
        <div class="separator"></div>
    </header>

    <main id="jokes-container" class="hidden">
        <!-- Los chistes se generan aquí con JS -->
    </main>

    <script src="script.js"></script>
</body>
</html>
